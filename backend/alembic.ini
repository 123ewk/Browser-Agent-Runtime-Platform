# Alembic 配置
# 数据库 URL 不写在这里,env.py 从 Settings 读
# 迁移脚本在 alembic/versions/

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url = driver://user:pass@localhost/dbname   <- 注释掉,走 env.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[post_write_hooks]
# 留空,后面要加 ruff 钩子再说

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
